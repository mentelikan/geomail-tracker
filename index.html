<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoMail Tracker - Panel de Control</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#f8fafc',
            surface: '#ffffff',
            primary: '#2563eb',
            'primary-hover': '#1d4ed8',
            'on-surface': '#0f172a',
            'text-secondary': '#475569',
            border: '#e2e8f0'
          }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* Forzar la tipografía Inter y transiciones suaves globales */
    body {
      font-family: 'Inter', sans-serif !important;
    }
    .fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="bg-background text-on-surface min-h-screen pb-32 antialiased subpixel-antialiased">

  <div id="loginScreen" class="flex min-h-screen flex-col items-center justify-center px-6 py-12 lg:px-8 fade-in">
    <div class="sm:mx-auto sm:w-full sm:max-w-md bg-surface p-8 rounded-2xl shadow-sm border border-border">
      
      <div class="flex flex-col items-center mb-6">
        <svg class="h-12 w-12 text-primary mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        <h2 class="text-center text-2xl font-bold tracking-tight text-on-surface">GeoMail Tracker</h2>
        <p class="text-sm text-text-secondary mt-1">Ingresa al panel de administración</p>
      </div>

      <div class="space-y-6">
        <div>
          <label for="usuario" class="block text-sm font-medium leading-6 text-on-surface">Usuario</label>
          <div class="mt-2">
            <input id="usuario" name="usuario" type="text" required class="block w-full rounded-xl border border-border bg-surface px-4 py-2.5 text-on-surface shadow-sm focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none sm:text-sm transition-all" placeholder="admin">
          </div>
        </div>

        <div>
          <label for="pass" class="block text-sm font-medium leading-6 text-on-surface">Contraseña</label>
          <div class="mt-2">
            <input id="pass" name="pass" type="password" required class="block w-full rounded-xl border border-border bg-surface px-4 py-2.5 text-on-surface shadow-sm focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none sm:text-sm transition-all" placeholder="••••••••">
          </div>
        </div>

        <div>
          <button onclick="login()" class="flex w-full justify-center rounded-xl bg-primary px-4 py-3 text-sm font-semibold leading-6 text-white shadow-md hover:bg-primary-hover focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary transition-all active:scale-[0.98]">
            Ingresar
          </button>
        </div>
      </div>

    </div>
  </div>

  <div id="dashboard" class="hidden max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-10 fade-in">
    <header class="mb-8 flex justify-between items-center">
      <div>
        <h1 class="text-3xl font-bold tracking-tight text-on-surface">Panel de Control</h1>
        <p class="text-sm text-text-secondary mt-1">Monitoreo de actividad geográfica en tiempo real</p>
      </div>
      <span class="inline-flex items-center gap-x-1.5 rounded-full bg-green-100 px-3 py-1.5 text-xs font-medium text-green-700">
        <span class="h-1.5 w-1.5 rounded-full bg-green-500 animate-pulse"></span>
        Sistema Activo
      </span>
    </header>

    <div class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-3 mb-10">
      <div class="bg-surface p-6 rounded-2xl shadow-sm border border-border flex items-center justify-between">
        <div>
          <p class="text-sm font-medium text-text-secondary truncate">Total Envíos Registrados</p>
          <p id="delivery-count" class="mt-2 text-4xl font-semibold tracking-tight text-on-surface">0</p>
        </div>
        <div class="p-3 bg-blue-50 rounded-xl text-primary">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 19v-8.93a2 2 0 01.89-1.664l8-5.333a2 2 0 012.22 0l8 5.333A2 2 0 0121 10.07V19M3 19a2 2 0 002 2h14a2 2 0 002-2M3 19l6.75-4.5M21 19l-6.75-4.5M3 10l6.75 4.5M21 10l-6.75 4.5m0 0l-1.14.76a2 2 0 01-2.22 0l-1.14-.76" />
          </svg>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Animación fluida de números para los contadores métricos
    function animateValue(obj, start, end, duration) {
      let startTimestamp = null;
      const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        obj.innerHTML = Math.floor(progress * (end - start) + start);
        if (progress < 1) {
          window.requestAnimationFrame(step);
        }
      };
      window.requestAnimationFrame(step);
    }

    // Proceso temporal de Login
    async function login() {
      const usuario = document.getElementById('usuario').value;
      const pass = document.getElementById('pass').value;

      if (!usuario || !pass) {
        alert('Por favor, ingresa tu usuario y contraseña.');
        return;
      }

      try {
        // Apuntando al backend local temporalmente
        const respuesta = await fetch('http://localhost:3000/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ usuario, password: pass })
        });

        const data = await respuesta.json();

        if (data.success) {
          // Ocultar login y mostrar panel con transición suave
          document.getElementById('loginScreen').classList.add('hidden');
          const dashboard = document.getElementById('dashboard');
          dashboard.classList.remove('hidden');
          
          // Disparar animación del contador numérico
          const deliveryCount = document.getElementById('delivery-count');
          if (deliveryCount) {
            animateValue(deliveryCount, 0, 42, 1200);
          }
        } else {
          alert('Credenciales incorrectas. Intenta nuevamente.');
        }
      } catch (error) {
        console.error('Error detectado:', error);
        alert('Error conectando con el servidor local.');
      }
    }
  </script>
</body>
</html>
